# Optional: SSH deploy to your own VPS. Off by default so Render-only setups stay green.
# Repo → Settings → Variables → Actions → add VPS_DEPLOY_ENABLED = true
# Repo → Settings → Secrets → add VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_APP_PATH (optional VPS_SSH_PORT).

name: Deploy VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    if: vars.VPS_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-vps
      cancel-in-progress: true
    steps:
      - name: Add SSH host key to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -T 15 -p "${SSH_PORT}" "${SSH_HOST}" >> ~/.ssh/known_hosts
        env:
          SSH_HOST: ${{ secrets.VPS_HOST }}
          SSH_PORT: ${{ secrets.VPS_SSH_PORT || '22' }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.VPS_APP_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            npm ci --omit=dev
            pm2 restart myapps || pm2 start server.js --name myapps
