# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard → New → Blueprint → connect this repo, or create Web Service manually with same commands.

services:
  - type: web
    name: cicd1-server
    runtime: node
    plan: free
    region: oregon
    branch: main
    # Required for push-to-deploy when using Blueprint / IaC (see Render blueprint spec).
    autoDeployTrigger: commit
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
